name: security-gate

# Demonstrates the RFI requirement: an automated CI/CD pipeline that enforces
# security guardrails BEFORE any infrastructure is provisioned, and emits a
# machine-readable SBOM. Checkov is the authoritative policy gate and FAILS the
# build on any unjustified High/Critical finding. Intentional exceptions (e.g.
# the public open-data bucket, per the NOAA NODD pattern) are documented inline
# as `checkov:skip` annotations with justifications — exceptions are scoped and
# auditable, never silenced.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

  iac-security:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      # Checkov — the authoritative policy-as-code gate. Honors inline
      # `checkov:skip` justifications. Fails the build on any other violation.
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: false

      # Trivy — maintained successor to tfsec; second-opinion IaC scan.
      # Reports findings but does not gate the build (Checkov is the gate),
      # so a second tool's heuristics can't override our documented exceptions.
      - name: Trivy IaC
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: terraform
          exit-code: "0"
          severity: HIGH,CRITICAL

      # Snyk IaC — optional third scanner; runs only when SNYK_TOKEN is set.
      - name: Snyk IaC
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        uses: snyk/actions/iac@master
        with:
          args: --severity-threshold=high terraform

  sbom:
    runs-on: ubuntu-latest
    needs: iac-security
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
